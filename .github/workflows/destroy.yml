name: Destroy

on:
  workflow_dispatch:

jobs:

  Destroy:

    runs-on: ubuntu-latest

    steps:

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: us-east-1

      - run: aws cloudformation delete-stack --stack-name Automation-Julian-Vergel

      - run: aws cloudformation delete-stack --stack-name ALB-ASG-Julian-Vergel

      - run: aws cloudformation delete-stack --stack-name EC2-Julian-Vergel

      - run: aws cloudformation delete-stack --stack-name Security-Julian-Vergel