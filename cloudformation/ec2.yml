AWSTemplateFormatVersion: '2010-09-09'

Description: EC2 Static

Parameters:

  KeyPair:
    Type: AWS::EC2::KeyPair::KeyName

Resources:

  MyEC2:

    Type: AWS::EC2::Instance

    Properties:

      InstanceType: t2.micro

      ImageId: ami-0c101f26f147fa7fd

      KeyName: !Ref KeyPair

      SecurityGroupIds:
        - Fn::ImportValue: EC2SG

      UserData:
        Fn::Base64: |
          #!/bin/bash
          yum update -y
          yum install httpd -y
          systemctl start httpd
          systemctl enable httpd

          echo "<h1>Cloud Computing Final Exam</h1>" > /var/www/html/index.html
          echo "<h2>Julian Vergel</h2>" >> /var/www/html/index.html
          echo "<p>Instancia desplegada desde CloudFormation</p>" >> /var/www/html/index.html

  ElasticIP:

    Type: AWS::EC2::EIP

    Properties:
      Domain: vpc

  EIPAssociation:

    Type: AWS::EC2::EIPAssociation

    Properties:
      InstanceId: !Ref MyEC2
      EIP: !Ref ElasticIP

Outputs:

  InstanceId:
    Value: !Ref MyEC2

  PublicIP:
    Value: !Ref ElasticIP