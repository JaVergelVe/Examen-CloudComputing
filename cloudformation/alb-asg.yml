AWSTemplateFormatVersion: '2010-09-09'

Description: ALB ASG Stack

Parameters:

  PublicSubnet1:
    Type: AWS::EC2::Subnet::Id

  PublicSubnet2:
    Type: AWS::EC2::Subnet::Id

  VpcId:
    Type: AWS::EC2::VPC::Id

Resources:

  LaunchTemplate:

    Type: AWS::EC2::LaunchTemplate

    Properties:

      LaunchTemplateName: LT-Julian-Vergel

      LaunchTemplateData:

        InstanceType: t2.micro

        ImageId: ami-0c101f26f147fa7fd

        SecurityGroupIds:
          - Fn::ImportValue: EC2SG

        UserData:
          Fn::Base64: |
            #!/bin/bash
            yum update -y
            yum install httpd -y
            systemctl start httpd
            systemctl enable httpd

            echo "<h1>Servidor AutoScaling</h1>" > /var/www/html/index.html
            echo "<h2>Version 1</h2>" >> /var/www/html/index.html

  TargetGroup:

    Type: AWS::ElasticLoadBalancingV2::TargetGroup

    Properties:

      Port: 80
      Protocol: HTTP
      VpcId: !Ref VpcId
      TargetType: instance

  ApplicationLoadBalancer:

    Type: AWS::ElasticLoadBalancingV2::LoadBalancer

    Properties:

      Name: ALB-Julian-JuanJose

      Scheme: internet-facing

      SecurityGroups:
        - Fn::ImportValue: ALBSG

      Subnets:
        - !Ref PublicSubnet1
        - !Ref PublicSubnet2

  Listener:

    Type: AWS::ElasticLoadBalancingV2::Listener

    Properties:

      LoadBalancerArn: !Ref ApplicationLoadBalancer

      Port: 80

      Protocol: HTTP

      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref TargetGroup

  AutoScalingGroup:

    Type: AWS::AutoScaling::AutoScalingGroup

    Properties:

      MinSize: 1
      MaxSize: 2
      DesiredCapacity: 1

      VPCZoneIdentifier:
        - !Ref PublicSubnet1
        - !Ref PublicSubnet2

      TargetGroupARNs:
        - !Ref TargetGroup

      LaunchTemplate:
        LaunchTemplateId: !Ref LaunchTemplate
        Version: !GetAtt LaunchTemplate.LatestVersionNumber

  WarmPool:

    Type: AWS::AutoScaling::WarmPool

    Properties:
      AutoScalingGroupName: !Ref AutoScalingGroup
      PoolState: Stopped

Outputs:

  ALBDNS:
    Value: !GetAtt ApplicationLoadBalancer.DNSName

  LaunchTemplateId:
    Value: !Ref LaunchTemplate

  ASGName:
    Value: !Ref AutoScalingGroup